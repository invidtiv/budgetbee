name: Build and Push Docker Image (Staging)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-and-push-staging:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Copy .env.staging to .env in API folder
      run: |
        cp ./api/.env.staging ./api/.env

    - name: Build the Docker images
      run: |
        docker build -t ghcr.io/budgetbee/budgetbee/proxy:staging ./docker/nginx
        docker build -t ghcr.io/budgetbee/budgetbee/api:staging ./api
        docker build -t ghcr.io/budgetbee/budgetbee/web:staging ./web

    - name: Login to ghcr.io
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push the Docker images to ghcr.io
      run: |
        docker push ghcr.io/budgetbee/budgetbee/proxy:staging
        docker push ghcr.io/budgetbee/budgetbee/api:staging
        docker push ghcr.io/budgetbee/budgetbee/web:staging
